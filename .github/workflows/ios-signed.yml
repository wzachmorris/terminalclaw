name: iOS signed build (mobile app)

on:
  push:
    branches: [main]
    paths: ['mobile/**', '.github/workflows/ios-signed.yml']
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    working-directory: mobile

jobs:
  build:
    # Expo SDK 57 needs Swift tools 6.2 → Xcode 26, which macos-26 has by default
    runs-on: macos-26
    # Skip silently until signing secrets are configured (see mobile/SETUP-SIGNING.md).
    if: ${{ vars.SIGNING_READY == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - run: npm ci

      # unique CFBundleVersion per build — iOS silently skips OTA reinstalls
      # when the incoming version matches the installed one
      - name: Stamp build number
        run: |
          jq --arg n "$GITHUB_RUN_NUMBER" '.expo.ios.buildNumber = $n' app.json > app.json.tmp
          mv app.json.tmp app.json

      - name: Expo prebuild (generate ios/)
        run: npx expo prebuild -p ios --no-install

      - name: Pod install
        # keep pod resource bundles unsigned so the manual signing overrides
        # on the xcodebuild command line can't break them
        run: |
          perl -0pi -e 's/post_install do \|installer\|/post_install do |installer|\n    installer.pods_project.targets.each do |t|\n      if t.respond_to?(:product_type) \&\& t.product_type == "com.apple.product-type.bundle"\n        t.build_configurations.each { |bc| bc.build_settings["CODE_SIGNING_ALLOWED"] = "NO" }\n      end\n    end/' ios/Podfile
          cd ios && pod install

      - name: Import signing credentials
        env:
          CERT_P12_B64: ${{ secrets.IOS_DIST_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.IOS_CERT_PASSWORD }}
          PROFILE_B64: ${{ secrets.IOS_PROVISIONING_PROFILE }}
        run: |
          KEYCHAIN=$RUNNER_TEMP/build.keychain
          security create-keychain -p ci "$KEYCHAIN"
          security set-keychain-settings -lut 1800 "$KEYCHAIN"
          security unlock-keychain -p ci "$KEYCHAIN"
          echo "$CERT_P12_B64" | base64 -d > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -k "$KEYCHAIN" -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k ci "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROFILE_B64" | base64 -d > $RUNNER_TEMP/profile.mobileprovision
          security cms -D -i $RUNNER_TEMP/profile.mobileprovision > $RUNNER_TEMP/profile.plist
          UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' $RUNNER_TEMP/profile.plist)
          NAME=$(/usr/libexec/PlistBuddy -c 'Print Name' $RUNNER_TEMP/profile.plist)
          cp $RUNNER_TEMP/profile.mobileprovision \
            ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
          echo "PROFILE_NAME=$NAME" >> $GITHUB_ENV

      - name: Archive
        run: >
          xcodebuild archive
          -workspace ios/TerminalClaw.xcworkspace
          -scheme TerminalClaw
          -configuration Release
          -destination 'generic/platform=iOS'
          -archivePath build/TerminalClaw.xcarchive
          CODE_SIGN_STYLE=Manual
          CODE_SIGN_IDENTITY="Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME"
          DEVELOPMENT_TEAM=3H74KBA2D9

      - name: Export ad-hoc ipa
        run: |
          cat > build/exportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>ad-hoc</string>
            <key>teamID</key><string>3H74KBA2D9</string>
            <key>signingStyle</key><string>manual</string>
            <key>provisioningProfiles</key>
            <dict><key>com.zacmorriss.terminalclaw</key><string>$PROFILE_NAME</string></dict>
          </dict></plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath build/TerminalClaw.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist build/exportOptions.plist
          mv build/export/*.ipa build/terminalclaw.ipa

      - name: Publish as 'app-latest' release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete app-latest --yes 2>/dev/null || true
          git push --delete origin app-latest 2>/dev/null || true
          gh release create app-latest build/terminalclaw.ipa \
            --title "Latest mobile build" \
            --notes "Signed ad-hoc build from $GITHUB_SHA"
