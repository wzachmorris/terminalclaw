<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TerminalClaw</title>
<link rel="icon" id="favLink" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20100%20100'%3E%3Ctext%20y='.9em'%20font-size='90'%3E%F0%9F%A6%80%3C/text%3E%3C/svg%3E">
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --panel2:#1c2230; --border:#2a3340;
    --text:#e6edf3; --muted:#8b949e; --accent:#58a6ff; --green:#3fb950;
    --red:#f85149; --amber:#d29922;
  }
  *{box-sizing:border-box}
  body{margin:0;font:14px/1.5 ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
       background:var(--bg);color:var(--text)}
  header{display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid var(--border);
         background:var(--panel);position:sticky;top:0;z-index:5}
  header h1{font-size:16px;margin:0;font-weight:600}
  header .dot{width:9px;height:9px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green)}
  header .spacer{flex:1}
  header button{background:var(--panel2);color:var(--text);border:1px solid var(--border);
                padding:6px 12px;border-radius:6px;cursor:pointer;font-size:13px}
  header button:hover{border-color:var(--accent)}
  .layout{display:grid;grid-template-columns:340px 1fr;height:calc(100vh - 51px)}
  .sidebar{overflow-y:auto;border-right:1px solid var(--border);padding:12px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px;
        margin-bottom:10px;cursor:pointer;transition:border-color .15s}
  .card:hover{border-color:var(--accent)}
  .card.active{border-color:var(--accent);background:var(--panel2)}
  .card h3{margin:0 0 4px;font-size:14px}
  .card .domains{color:var(--muted);font-size:12px;word-break:break-all}
  .card .pills{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
  .pill{font-size:11px;padding:2px 7px;border-radius:10px;border:1px solid var(--border);
        display:flex;align-items:center;gap:5px}
  .pill .s{width:7px;height:7px;border-radius:50%}
  .up .s{background:var(--green)} .down .s{background:var(--red)} .absent .s{background:var(--muted)}
  /* systemd services get a square dot (vs round for containers) + a gear glyph */
  .pill.svc .s{border-radius:2px}
  .pill.svc .g{font-size:9px;opacity:.7;margin-right:-2px}
  /* color tag: left accent bar on a card */
  .card{position:relative;padding-left:14px}
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;
                border-radius:8px 0 0 8px;background:var(--tag,transparent)}
  /* card header row: claude dot + title + color swatch */
  .card-top{display:flex;align-items:center;gap:7px}
  .card-top h3{margin:0;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  /* "claude is running" indicator light */
  .claude{width:8px;height:8px;border-radius:50%;background:var(--green);flex:none;
          box-shadow:0 0 6px var(--green);animation:pulse 1.6s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  /* color swatch button (opens the palette) */
  .swatch{width:14px;height:14px;border-radius:50%;flex:none;cursor:pointer;padding:0;
          border:1px solid var(--border);background:var(--tag,transparent);opacity:.55}
  .swatch:hover{opacity:1;border-color:var(--accent)}
  .swatch.empty{background:repeating-conic-gradient(var(--muted) 0 25%,transparent 0 50%) 50%/6px 6px}
  /* palette popover */
  .palette{position:absolute;z-index:20;background:var(--panel2);border:1px solid var(--border);
           border-radius:9px;padding:8px;display:grid;grid-template-columns:repeat(4,18px);gap:7px;
           box-shadow:0 6px 20px rgba(0,0,0,.5)}
  .palette b{width:18px;height:18px;border-radius:50%;cursor:pointer;border:1px solid rgba(255,255,255,.15)}
  .palette b:hover{transform:scale(1.15)}
  .palette .clear{grid-column:1/5;font-size:11px;color:var(--muted);text-align:center;cursor:pointer;
                  border:1px solid var(--border);border-radius:6px;padding:3px}
  .palette .clear:hover{border-color:var(--accent);color:var(--text)}
  /* drag-to-reorder */
  .card[draggable=true]{cursor:grab}
  .card.dragging{opacity:.4}
  .card.drop-before{box-shadow:0 -3px 0 var(--accent)}
  .card.drop-after{box-shadow:0 3px 0 var(--accent)}
  /* collapsed (inactive) card: name + dots only */
  .card.compact{padding-top:9px;padding-bottom:9px;margin-bottom:6px}
  .card.compact .domains,.card.compact .pills{display:none}
  .card.compact .card-top{gap:7px}
  /* click-to-rename header title */
  /* click-to-change browser-tab icon */
  .favbtn{cursor:pointer;font-size:16px;line-height:1;border-radius:5px;padding:2px 4px;user-select:none}
  .favbtn:hover{background:var(--panel2)}
  .favin{width:3.2em;font-size:15px;padding:2px 4px;background:var(--bg);border:1px solid var(--accent);
         border-radius:5px;color:var(--text);outline:none;text-align:center}
  #hubTitle{cursor:text;border-radius:5px;padding:1px 6px;margin:0 -2px;outline:none}
  #hubTitle:hover{background:var(--panel2)}
  #hubTitle.editing{background:var(--panel2);box-shadow:inset 0 0 0 1px var(--accent);cursor:text}
  header button.on{border-color:var(--accent);color:var(--accent)}
  /* add-project row */
  .addbtn{width:100%;padding:10px;background:transparent;color:var(--muted);border:1px dashed var(--border);
          border-radius:8px;cursor:pointer;font-size:13px}
  .addbtn:hover{border-color:var(--accent);color:var(--accent)}
  .addform{background:var(--panel);border:1px solid var(--accent);border-radius:8px;padding:12px}
  .addform input{width:100%;box-sizing:border-box;margin-bottom:8px;padding:8px;background:var(--bg);
                 border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px}
  .addform input:focus{outline:none;border-color:var(--accent)}
  .addbtns{display:flex;gap:6px}
  .addform button{flex:1;padding:7px;border-radius:6px;border:1px solid var(--border);cursor:pointer;
                  background:var(--accent);color:#0d1117;font-weight:600;font-size:13px}
  .addform button.ghost{background:transparent;color:var(--muted);font-weight:400}
  .addform button.ghost:hover{border-color:var(--accent);color:var(--text)}
  .adderr{color:var(--red);font-size:12px;margin-top:7px;min-height:0}
  .addroot{font-size:11.5px;color:var(--muted);margin-top:9px;border-top:1px solid var(--border);padding-top:8px}
  .addroot code{color:var(--text);background:var(--bg);padding:1px 4px;border-radius:4px}
  .addroot a{color:var(--accent);cursor:pointer}
  .addroot a:hover{text-decoration:underline}
  .rootin{width:100%;box-sizing:border-box;padding:6px;background:var(--bg);border:1px solid var(--accent);
          border-radius:6px;color:var(--text);font-size:12.5px}
  .rootsel{width:100%;box-sizing:border-box;padding:6px;background:var(--bg);border:1px solid var(--accent);
           border-radius:6px;color:var(--text);font-size:12.5px}
  .rootload{color:var(--muted);font-size:12px}
  .rootsave{margin-top:6px;padding:5px 12px;border-radius:6px;border:1px solid var(--accent);
            background:var(--accent);color:#0d1117;font-weight:600;font-size:12px;cursor:pointer}
  .rooterr{color:var(--red);font-size:11px;margin-top:4px}
  .adderr code{color:var(--text);background:var(--bg);padding:1px 4px;border-radius:4px}
  .adderr button.mkdir{display:block;width:100%;margin-top:7px;padding:7px;border-radius:6px;
                       border:1px solid var(--accent);background:var(--accent);color:#0d1117;
                       font-weight:600;font-size:12px;cursor:pointer}
  .main{display:flex;flex-direction:column;overflow:hidden}
  .tabs{display:flex;gap:4px;padding:10px 14px 0;border-bottom:1px solid var(--border);background:var(--panel)}
  .tab{padding:7px 14px;border-radius:7px 7px 0 0;cursor:pointer;color:var(--muted);font-size:13px;
       border:1px solid transparent;border-bottom:none;display:flex;align-items:center;gap:6px;white-space:nowrap}
  .tab.active{color:var(--text);background:var(--bg);border-color:var(--border)}
  .tab .tabx{opacity:.5;font-size:14px;line-height:1;border-radius:3px;padding:0 2px}
  .tab .tabx:hover{opacity:1;color:var(--red);background:var(--panel2)}
  .tab.addtab{color:var(--muted);font-weight:600;padding:7px 11px}
  .tab.addtab:hover{color:var(--accent)}
  /* project directory box (above the tab row) — folder name, tap/hover for full path */
  .projdir{display:none;align-items:center;gap:8px;padding:8px 14px;background:var(--panel);
           border-bottom:1px solid var(--border);color:var(--muted);font-size:12.5px;cursor:pointer;
           white-space:nowrap;overflow:hidden;user-select:none}
  .projdir:hover{color:var(--text)}
  .projdir .ico{flex:none;opacity:.8}
  .projdir code{background:var(--panel2);padding:1px 8px;border-radius:5px;color:var(--text);
                font:12px ui-monospace,SFMono-Regular,Menlo,monospace;overflow:hidden;text-overflow:ellipsis}
  .projdir .hint{opacity:.5;font-size:11px;flex:none}
  .docview{padding:20px 26px}
  .docview .docpath{color:var(--muted);font-size:12px;margin-bottom:12px;word-break:break-all}
  .docview pre.raw{background:var(--panel2);padding:14px;border-radius:8px;overflow:auto;
                   font-size:12.5px;white-space:pre;tab-size:4}
  .docview .addtabform{max-width:460px}
  .docview .addtabform input{width:100%;box-sizing:border-box;margin:6px 0 12px;padding:9px;
       background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:14px}
  .docview .addtabform input:focus{outline:none;border-color:var(--accent)}
  .docview .addtabform label{font-size:12px;color:var(--muted)}
  .docview .addtabform .row{display:flex;gap:8px;margin-top:4px}
  .docview .addtabform button{padding:9px 16px;border-radius:7px;border:1px solid var(--border);cursor:pointer;
       background:var(--accent);color:#0d1117;font-weight:600;font-size:13px}
  .docview .addtabform button.ghost{background:transparent;color:var(--muted);font-weight:400}
  /* small inline action buttons (Edit/Save/Add file) */
  .mini{background:var(--panel2);color:var(--text);border:1px solid var(--border);border-radius:6px;
        padding:4px 11px;font-size:12px;cursor:pointer;white-space:nowrap}
  .mini:hover{border-color:var(--accent)}
  .mini.ghost{background:transparent;color:var(--muted)}
  .globhd{display:flex;align-items:center;gap:10px;color:var(--muted);margin-bottom:12px}
  .globhd span{flex:1}
  /* doc view header bar (back / path / edit) */
  .docbar{display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .docbar .docpath{flex:1;margin:0}
  .docbar .back{cursor:pointer;color:var(--accent)}
  .editor{width:100%;min-height:62vh;box-sizing:border-box;background:var(--panel2);color:var(--text);
          border:1px solid var(--border);border-radius:8px;padding:14px;
          font:13px/1.6 ui-monospace,SFMono-Regular,Menlo,monospace;resize:vertical;tab-size:4}
  .editor:focus{outline:none;border-color:var(--accent)}
  /* remove-× on a file list row */
  .file{position:relative}
  .file .tabx{position:absolute;right:8px;top:10px;opacity:.5;font-size:16px;line-height:1;
              padding:0 5px;border-radius:4px}
  .file .tabx:hover{opacity:1;color:var(--red);background:var(--panel2)}
  /* file picker modal */
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;
         justify-content:center;z-index:50}
  .modalbox{background:var(--panel);border:1px solid var(--border);border-radius:12px;width:min(560px,92vw);
            max-height:80vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 10px 40px rgba(0,0,0,.6)}
  .modalhd{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border)}
  .modalhd b{flex:1}
  .modalhd .x{cursor:pointer;color:var(--muted);font-size:20px;line-height:1}
  .modalhd .x:hover{color:var(--red)}
  .crumb{padding:8px 16px;color:var(--muted);font-size:12px;word-break:break-all;border-bottom:1px solid var(--border)}
  .browse{overflow:auto;padding:6px}
  .brow{padding:8px 12px;border-radius:7px;cursor:pointer;font-size:13px;white-space:nowrap;
        overflow:hidden;text-overflow:ellipsis}
  .brow:hover{background:var(--panel2)}
  .brow.dir{color:var(--accent)}
  .content{flex:1;overflow:hidden;position:relative}
  .pane{position:absolute;inset:0;overflow:auto;padding:0}
  .pane.hidden{display:none}
  #termFrame{width:100%;height:100%;border:0;background:#000}
  /* terminal pane stacks the iframe above the mobile tap-bar */
  #pane-terminal{display:flex;flex-direction:column;overflow:hidden}
  #pane-terminal #termFrame{flex:1 1 auto;height:auto;min-height:0}
  .keybar{flex:0 0 auto;display:flex;gap:6px;align-items:center;padding:6px 8px;
          background:var(--panel);border-top:1px solid var(--border);
          overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch}
  .keybar button{flex:0 0 auto;min-width:42px;height:38px;padding:0 11px;border-radius:8px;
          border:1px solid var(--border);background:var(--panel2);color:var(--text);
          font-size:15px;line-height:1;cursor:pointer;user-select:none;touch-action:manipulation}
  .keybar button:active{background:var(--accent);color:#0d1117;border-color:var(--accent)}
  .keybar .kauto{font-size:12.5px;font-weight:600}
  .keybar .kpaste{font-size:12.5px;font-weight:600}
  .keybar .kint{color:var(--red)}
  .keybar #mouseBtn.on{background:var(--accent);color:#0d1117;border-color:var(--accent)}
  .keybar .ksep{flex:0 0 auto;width:1px;height:22px;background:var(--border);margin:0 2px}
  .keybar .kmic{font-size:12.5px;font-weight:600}
  /* 🎤 dictation box — reuses .modal/.modalbox; a clean textarea so soft-keyboard
     voice transcription isn't duplicated the way it is typed straight into xterm */
  .dictate-body{padding:14px 16px;display:flex;flex-direction:column;gap:12px}
  .dictate-hint{margin:0;color:var(--muted);font-size:12.5px;line-height:1.45}
  #dictateText{width:100%;box-sizing:border-box;min-height:140px;resize:vertical;
       background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:8px;
       padding:11px;font-size:16px;line-height:1.4;font-family:inherit}
  #dictateText:focus{outline:none;border-color:var(--accent)}
  .dictate-btns{display:flex;gap:8px;justify-content:flex-end}
  .dictate-btns button{padding:9px 16px;border-radius:8px;border:1px solid var(--border);cursor:pointer;
       background:var(--accent);color:#0d1117;font-weight:600;font-size:14px}
  .dictate-btns button.ghost{background:transparent;color:var(--muted);font-weight:400}
  .dictate-btns button.ghost:hover{border-color:var(--accent);color:var(--text)}
  .md{padding:20px 26px;max-width:900px}
  .md h1,.md h2,.md h3{border-bottom:1px solid var(--border);padding-bottom:4px}
  .md code{background:var(--panel2);padding:1px 5px;border-radius:4px;font-size:12.5px}
  .md pre{background:var(--panel2);padding:12px;border-radius:8px;overflow:auto}
  .md a{color:var(--accent)}
  .memlist{padding:16px 20px}
  .memlist .file{padding:9px 12px;border:1px solid var(--border);border-radius:7px;margin-bottom:8px;
                 cursor:pointer;background:var(--panel)}
  .memlist .file:hover{border-color:var(--accent)}
  .memlist .file .desc{color:var(--muted);font-size:12px;margin-top:3px}
  .empty{padding:40px;color:var(--muted);text-align:center}
  .back{color:var(--accent);cursor:pointer;font-size:13px;display:inline-block;margin:14px 0 0 20px}
  .navtoggle{display:none}
  .scrim{display:none}
  @media (max-width:760px){
    .navtoggle{display:inline-block}
    #clock{display:none}
    .layout{grid-template-columns:1fr}
    .sidebar{position:fixed;top:51px;left:0;bottom:0;width:min(85vw,340px);z-index:10;
             background:var(--bg);transform:translateX(-100%);transition:transform .2s ease;
             box-shadow:2px 0 16px rgba(0,0,0,.5)}
    .layout.nav-open .sidebar{transform:translateX(0)}
    .scrim{position:fixed;inset:51px 0 0 0;background:rgba(0,0,0,.5);z-index:9}
    .layout.nav-open .scrim{display:block}
  }
</style>
</head>
<body>
<header>
  <button class="navtoggle" onclick="toggleNav()">☰ Projects</button>
  <span class="dot"></span>
  <span id="favBtn" class="favbtn" title="Click to change the browser-tab icon" onclick="editFavicon()">🦀</span>
  <h1 id="hubTitle" title="Click to rename" onclick="editTitle()">TerminalClaw</h1>
  <span class="spacer"></span>
  <span id="clock" style="color:var(--muted);font-size:12px"></span>
  <button id="collapseBtn" onclick="toggleCompact()" title="Collapse inactive projects to their name">⇕ Compact</button>
  <button onclick="loadProjects()">↻ Refresh</button>
</header>

<div class="layout" id="layout">
  <div class="scrim" onclick="toggleNav(false)"></div>
  <div class="sidebar" id="sidebar"></div>
  <div class="main">
    <div class="projdir" id="projdir" onclick="toggleProjDir()"></div>
    <div class="tabs" id="tabbar"></div>
    <div class="content">
      <div class="pane" id="pane-terminal">
        <iframe id="termFrame" src="about:blank"></iframe>
        <!-- mobile tap-bar: keys a phone keyboard can't reliably send into
             an interactive prompt (menus, Shift-Tab auto mode, Ctrl-C, …) -->
        <div class="keybar" id="keybar">
          <button onclick="sendKey('up')" title="Up">↑</button>
          <button onclick="sendKey('down')" title="Down">↓</button>
          <span class="ksep"></span>
          <button onclick="sendKey('1')">1</button>
          <button onclick="sendKey('2')">2</button>
          <button onclick="sendKey('3')">3</button>
          <button onclick="sendKey('4')">4</button>
          <button onclick="sendKey('5')">5</button>
          <span class="ksep"></span>
          <button onclick="sendKey('esc')" title="Escape / cancel">Esc</button>
          <span class="ksep"></span>
          <button onclick="sendKey('tab')" title="Tab">⇥</button>
          <button class="kauto" onclick="sendKey('btab')" title="Shift-Tab — cycle auto-accept / plan mode">⇧⇥ Auto</button>
          <span class="ksep"></span>
          <button class="kint" onclick="sendKey('ctrl-c')" title="Interrupt (Ctrl-C)">^C</button>
          <span class="ksep"></span>
          <button class="kmic" onclick="openDictate()" title="Dictate — speak into a clean box (no repeats), then send to the terminal for you to review &amp; run">🎤 Dictate</button>
          <button class="kpaste" onclick="pasteToTerm()" title="Paste clipboard into the terminal">📋 Paste</button>
          <button id="mouseBtn" onclick="toggleMouse()" title="Scroll mode — swipe/wheel to scroll terminal history (off = drag to select &amp; copy)">📜</button>
        </div>
      </div>
      <div class="pane hidden" id="pane-memory">
        <div class="empty">Select a project to view its memory &amp; context.</div>
      </div>
      <div class="pane hidden" id="pane-essentials"></div>
      <div class="pane hidden" id="pane-credentials"></div>
      <div class="pane hidden" id="pane-doc"></div>
    </div>
  </div>
</div>

<script>
let PROJECTS = [];
let GLOBALS = {essentials:[], credentials:[]};   // per-box reference-tab file lists (from projects.json)
let CURRENT = null;
let TAB = "terminal";
let DIR_FULL = false;       // project-dir box: false = folder name, true = full path
let DRAGGING = false;       // a card is being dragged — suppress poll-driven rebuilds
let PALETTE_OPEN = false;   // the color popover is open — suppress full rebuilds
let DRAG_ID = null;
let TITLE = "TerminalClaw";
let PROJECTS_ROOT = "";      // default dir new projects start in (pre-fill only)
let COMPACT = localStorage.getItem("tc_compact")==="1";   // collapse inactive cards (per-device view pref)
let ADDING = false;         // the new-project form is open — suppress poll-driven rebuilds
const PALETTE = ["#f85149","#d29922","#3fb950","#58a6ff","#a371f7","#ec6cb9","#79c0ff","#8b949e"];
const TOUCH = matchMedia("(pointer: coarse)").matches;   // touch device? -> disable card drag so taps switch projects

function clock(){ const d=new Date(); document.getElementById("clock").textContent=d.toLocaleString(); }
setInterval(clock,1000); clock();

async function loadProjects(){
  if(DRAGGING) return;                 // never yank the DOM out from under a drag
  const r = await fetch("/api/projects");
  const data = await r.json();
  setTitle(data.title);
  setFavicon(data.favicon);
  PROJECTS_ROOT = data.projects_root || "";
  GLOBALS.essentials = data.essentials || [];
  GLOBALS.credentials = data.credentials || [];
  const prev = PROJECTS.map(p=>p.id).join(",");
  PROJECTS = data.projects;
  if(!CURRENT && PROJECTS.length){ renderSidebar(); selectProject(PROJECTS[0].id); return; }
  const same = PROJECTS.map(p=>p.id).join(",")===prev;   // same ids, same order?
  if(same) updateStatuses();           // light in-place refresh (dots/pills) — keeps scroll
  else if(!PALETTE_OPEN && !ADDING) renderSidebar();
}

function statusClass(st){
  if(!st) return "absent";
  const s=(st.state||"").toLowerCase();
  if(s==="running") return "up";
  if(s==="absent") return "absent";
  return "down";
}

function pillsHtml(p){
  const pills=(p.containers||[]).map(name=>{
    const st=p.status?p.status[name]:null; const cls=statusClass(st);
    return `<span class="pill ${cls}" title="container: ${(st&&st.status)||'n/a'}"><span class="s"></span>${name.replace(/_/g,' ')}</span>`;
  }).join("");
  const svc=(p.services||[]).map(name=>{
    const st=p.svc_status?p.svc_status[name]:null; const cls=statusClass(st);
    const label=name.replace(/\.service$/,'');
    return `<span class="pill svc ${cls}" title="systemd: ${(st&&st.status)||'n/a'}"><span class="g">⚙</span><span class="s"></span>${label}</span>`;
  }).join("");
  return (pills+svc)||'<span class="domains">no services</span>';
}

function renderSidebar(){
  const sb=document.getElementById("sidebar");
  const scroll=sb.scrollTop;            // preserve scroll across rebuilds
  sb.innerHTML="";
  PROJECTS.forEach(p=>{
    const c=document.createElement("div");
    c.className="card"+(CURRENT===p.id?" active":"")+(COMPACT&&CURRENT!==p.id?" compact":"");
    c.dataset.id=p.id;
    c.draggable=!TOUCH;                  // desktop: draggable to reorder; touch: off so taps register
    if(p.color) c.style.setProperty("--tag",p.color);
    c.onclick=()=>selectProject(p.id);
    if(!TOUCH){                          // drag-to-reorder is desktop-only (touch drag blocked taps)
      c.addEventListener("dragstart",onDragStart);
      c.addEventListener("dragover",onDragOver);
      c.addEventListener("dragleave",onDragLeave);
      c.addEventListener("drop",onDrop);
      c.addEventListener("dragend",onDragEnd);
    }
    const domains=(p.domains&&p.domains.length)?p.domains.join(", "):"<i>no public domain</i>";
    const dot=p.claude_running?'<span class="claude" title="Claude is running"></span>':'';
    c.innerHTML=`<div class="card-top">${dot}<h3>${esc(p.name)}</h3>`+
                `<button class="swatch ${p.color?'':'empty'}" title="Color tag" `+
                `onclick="openPalette(event,'${p.id}')"></button></div>`+
                `<div class="domains">${domains}</div>`+
                `<div class="pills">${pillsHtml(p)}</div>`;
    sb.appendChild(c);
  });
  const add=document.createElement("div");
  add.id="addRow";
  add.innerHTML='<button class="addbtn" onclick="openAdd()">+ New project</button>';

}

// In-place refresh of the dynamic bits only (claude dot, container pills,
// active/color state) so the 6s poll doesn't rebuild the list or reset scroll.
function updateStatuses(){
  PROJECTS.forEach(p=>{
    const card=document.querySelector('.card[data-id="'+CSS.escape(p.id)+'"]');
    if(!card) return;
    card.classList.toggle("active",CURRENT===p.id);
    card.classList.toggle("compact",COMPACT&&CURRENT!==p.id);
    if(p.color) card.style.setProperty("--tag",p.color); else card.style.removeProperty("--tag");
    const top=card.querySelector(".card-top");
    let dot=top.querySelector(".claude");
    if(p.claude_running&&!dot){ dot=document.createElement("span"); dot.className="claude";
      dot.title="Claude is running"; top.insertBefore(dot,top.firstChild); }
    else if(!p.claude_running&&dot){ dot.remove(); }
    const sw=top.querySelector(".swatch"); if(sw) sw.classList.toggle("empty",!p.color);
    const pe=card.querySelector(".pills"); if(pe) pe.innerHTML=pillsHtml(p);
  });
}

// --- drag-to-reorder (desktop pointer drag) -------------------------------
function onDragStart(e){ DRAG_ID=this.dataset.id; DRAGGING=true; this.classList.add("dragging");
  e.dataTransfer.effectAllowed="move"; try{e.dataTransfer.setData("text/plain",DRAG_ID);}catch(_){}}
function onDragOver(e){
  if(!DRAG_ID||this.dataset.id===DRAG_ID) return;
  e.preventDefault(); e.dataTransfer.dropEffect="move";
  const r=this.getBoundingClientRect(); const after=e.clientY>r.top+r.height/2;
  this.classList.toggle("drop-after",after);
  this.classList.toggle("drop-before",!after);
}
function onDragLeave(){ this.classList.remove("drop-before","drop-after"); }
function onDrop(e){
  e.preventDefault();
  const after=this.classList.contains("drop-after");
  this.classList.remove("drop-before","drop-after");
  const fromId=DRAG_ID, toId=this.dataset.id;
  if(!fromId||fromId===toId) return;
  const from=PROJECTS.findIndex(p=>p.id===fromId);
  const moved=PROJECTS.splice(from,1)[0];
  let to=PROJECTS.findIndex(p=>p.id===toId);
  if(after) to+=1;
  PROJECTS.splice(to,0,moved);
  renderSidebar();
  saveLayout({order:PROJECTS.map(p=>p.id)});
}
function onDragEnd(){ DRAGGING=false; DRAG_ID=null;
  document.querySelectorAll(".card").forEach(c=>c.classList.remove("dragging","drop-before","drop-after")); }

// --- color tags -----------------------------------------------------------
function openPalette(ev,id){
  ev.stopPropagation();
  closePalette();
  PALETTE_OPEN=true;
  const sw=ev.currentTarget, card=sw.closest(".card");
  const pop=document.createElement("div");
  pop.className="palette"; pop.id="palette";
  pop.innerHTML=PALETTE.map(c=>`<b style="background:${c}" data-c="${c}"></b>`).join("")+
                '<div class="clear" data-c="">Clear tag</div>';
  pop.addEventListener("click",e=>{
    const t=e.target.closest("[data-c]"); if(!t) return;
    e.stopPropagation(); setColor(id,t.getAttribute("data-c")); closePalette();
  });
  card.appendChild(pop);
  pop.style.top=(sw.offsetTop+sw.offsetHeight+6)+"px";
  pop.style.left=Math.max(8,sw.offsetLeft-92)+"px";
  setTimeout(()=>document.addEventListener("click",closePalette,{once:true}),0);
}
function closePalette(){ const p=document.getElementById("palette"); if(p)p.remove(); PALETTE_OPEN=false; }
function setColor(id,color){
  const p=PROJECTS.find(x=>x.id===id); if(!p) return;
  if(color) p.color=color; else delete p.color;
  renderSidebar();
  saveLayout({colors:{[id]:color||null}});
}

async function saveLayout(body){
  try{ await fetch("/api/layout",{method:"POST",headers:{"Content-Type":"application/json"},
       body:JSON.stringify(body)}); }
  catch(e){ console.warn("layout save failed",e); }
}

// Mobile tap-bar: inject one whitelisted key into the current project's tmux
// session (server-side send-keys) so phone users can drive interactive prompts.
async function sendKey(key){
  if(!CURRENT) return;
  try{ await fetch("/api/term/key",{method:"POST",headers:{"Content-Type":"application/json"},
       body:JSON.stringify({project:CURRENT,key})}); }
  catch(e){ /* best-effort; the key either lands in tmux or it doesn't */ }
}
async function sendPaste(text){
  if(!CURRENT || !text) return;
  try{ await fetch("/api/term/paste",{method:"POST",headers:{"Content-Type":"application/json"},
       body:JSON.stringify({project:CURRENT,text})}); }
  catch(e){ /* best-effort */ }
}
// Read the system clipboard and bracketed-paste it into the terminal. Falls
// back to a manual prompt when the browser blocks clipboard reads (e.g. iOS).
async function pasteToTerm(){
  if(!CURRENT) return;
  let text=null;
  try{ text=await navigator.clipboard.readText(); }
  catch(e){ text=window.prompt("Paste here, then OK — sends into the terminal:")||""; }
  sendPaste(text);
}
// Toggle tmux mouse/scroll mode; the button tracks state (client is the only
// thing that flips it, so its class is the source of truth).
async function toggleMouse(){
  if(!CURRENT) return;
  const btn=document.getElementById("mouseBtn");
  const want=!btn.classList.contains("on");
  try{
    const r=await fetch("/api/term/mouse",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({project:CURRENT,on:want})});
    const j=await r.json();
    btn.classList.toggle("on", j.mouse==="on");
  }catch(e){ /* leave button as-is on failure */ }
}

// 🎤 Dictation box. Soft-keyboard voice transcription duplicates itself when typed
// straight into xterm.js — dictation streams partial composition events and the
// terminal forwards each one. So capture it in a plain <textarea> (clean there),
// then bracketed-paste the final text into the terminal via the existing paste
// channel. Bracketed paste doesn't auto-run, so it lands at the prompt for the
// user to review and press Enter themselves.
function openDictate(){
  if(!CURRENT) return;
  let m=document.getElementById("dictateModal");
  if(!m){ m=document.createElement("div"); m.id="dictateModal"; m.className="modal"; document.body.appendChild(m); }
  m.innerHTML='<div class="modalbox"><div class="modalhd"><b>🎤 Dictate to terminal</b>'+
    '<span class="x" title="Close" onclick="closeDictate()">×</span></div>'+
    '<div class="dictate-body">'+
    '<p class="dictate-hint">Tap your keyboard\'s mic and speak — transcription stays clean here. '+
    'Edit if needed, then Send: it drops onto the prompt <b>without running</b>, so you review and press Enter yourself.</p>'+
    '<textarea id="dictateText" placeholder="Speak or type here…" autocomplete="off"></textarea>'+
    '<div class="dictate-btns"><button class="ghost" onclick="closeDictate()">Cancel</button>'+
    '<button onclick="sendDictate()">Send to terminal</button></div></div></div>';
  m.style.display="flex";
  const ta=document.getElementById("dictateText");
  ta.addEventListener("keydown",e=>{ if(e.key==="Escape"){ e.preventDefault(); closeDictate(); } });
  ta.focus();
}
function closeDictate(){ const m=document.getElementById("dictateModal"); if(m) m.style.display="none"; }
async function sendDictate(){
  const ta=document.getElementById("dictateText"); if(!ta) return;
  const text=ta.value;
  if(text.trim()) await sendPaste(text);   // reuse /api/term/paste (bracketed, no Enter)
  closeDictate();
}

function setTitle(t){
  TITLE=(t&&String(t).trim())||"TerminalClaw";
  document.title=TITLE;

  if(h && document.activeElement!==h) h.textContent=TITLE;   // don't clobber mid-edit
}
function editTitle(){
  const h=document.getElementById("hubTitle");
  h.contentEditable="true"; h.classList.add("editing"); h.focus();
  const r=document.createRange(); r.selectNodeContents(h);
  const s=getSelection(); s.removeAllRanges(); s.addRange(r);
}
function commitTitle(){
  const h=document.getElementById("hubTitle");
  if(h.contentEditable!=="true") return;
  h.contentEditable="false"; h.classList.remove("editing");
  const t=h.textContent.trim().slice(0,80);

  h.textContent=TITLE;
}

// --- editable browser-tab icon (persists to projects.json 'favicon') ------
let FAVICON = "🦀";
function faviconURI(emoji){
  const svg='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">'+
            '<text y=".9em" font-size="90">'+emoji+'</text></svg>';
  return 'data:image/svg+xml,'+encodeURIComponent(svg);
}
function setFavicon(emoji){
  FAVICON=(emoji&&String(emoji).trim())||"🦀";
  document.getElementById("favLink").href=faviconURI(FAVICON);
  const b=document.getElementById("favBtn");
  if(b && b.tagName==="SPAN") b.textContent=FAVICON;   // don't clobber mid-edit
}
function editFavicon(){
  const b=document.getElementById("favBtn");
  if(b.tagName!=="SPAN") return;                        // already editing
  const inp=document.createElement("input");
  inp.id="favBtn"; inp.className="favin"; inp.value=FAVICON; inp.maxLength=16;
  inp.title="Type an emoji, then Enter (blank = default)";
  b.replaceWith(inp); inp.focus(); inp.select();
  const done=commit=>{
    const v=inp.value.trim().slice(0,16);
    const span=document.createElement("span");
    span.id="favBtn"; span.className="favbtn";
    span.title="Click to change the browser-tab icon";
    span.setAttribute("onclick","editFavicon()");
    span.textContent=commit?(v||"🦀"):FAVICON;
    inp.replaceWith(span);
    if(commit && v!==FAVICON){ setFavicon(v); saveLayout({favicon:v}); }
  };
  inp.addEventListener("keydown",e=>{
    if(e.key==="Enter"){ e.preventDefault(); done(true); }
    else if(e.key==="Escape"){ e.preventDefault(); done(false); }
  });
  inp.addEventListener("blur",()=>done(true));
}

// The "default location" control inside the add-project form. Sets PROJECTS_ROOT
// (persisted hub-wide); the directory field is only ever pre-filled from it.
function renderAddRoot(){
  const el=document.getElementById("addRoot");
  if(!el) return;
  el.innerHTML=PROJECTS_ROOT
    ? `New projects open in <code>${esc(PROJECTS_ROOT)}/</code> · `+
      `<a onclick="editProjectsRoot()">change</a>`
    : `<a onclick="editProjectsRoot()">Set a default location…</a>`;
}
// Dropdown of candidate roots — home + its sub-folders (live from /api/browse),
// plus "none" to clear and "Custom path…" to type one freely.
async function editProjectsRoot(){
  const el=document.getElementById("addRoot");
  el.innerHTML='<div class="rootload">Loading folders…</div>';
  // The server runs as root, so ~ is useless here — build candidates from where
  // projects actually live: the parent dirs of existing projects + /home + /opt.
  const seen=new Set(), cands=[];
  const add=p=>{ if(p && !seen.has(p)){ seen.add(p); cands.push(p); } };
  (PROJECTS||[]).map(p=>p.dir).filter(Boolean).forEach(d=>
    add(d.replace(/\/+$/,"").replace(/\/[^/]+$/,"")||"/"));   // each project's parent
  try{
    const r=await fetch("/api/browse?dir="+encodeURIComponent("/home"));
    const d=await r.json();
    (d.entries||[]).filter(e=>e.is_dir && !e.name.startsWith(".")).forEach(e=>add(e.path));
  }catch(e){ /* fall back to whatever we have + custom */ }
  add("/opt");
  if(PROJECTS_ROOT) add(PROJECTS_ROOT);                       // keep current selectable
  cands.sort();
  const opts=cands.map(p=>
    `<option value="${esc(p)}"${p===PROJECTS_ROOT?" selected":""}>📁 ${esc(p)}</option>`).join("");
  el.innerHTML=
    `<select id="rootSel" class="rootsel" onchange="rootSelChanged()">`+
      `<option value=""${PROJECTS_ROOT?"":" selected"}>— none (type each time) —</option>`+
      opts+
      `<option value="__custom__">✎ Custom path…</option>`+
    `</select><div id="rootCustom"></div><div class="rooterr" id="rootErr"></div>`;
}
function rootSelChanged(){
  const v=document.getElementById("rootSel").value;
  const custom=document.getElementById("rootCustom");
  if(v==="__custom__"){
    custom.innerHTML=
      `<input id="rootIn" class="rootin" placeholder="/home/wzachmorris" `+
      `value="${esc(PROJECTS_ROOT)}" autocomplete="off">`+
      `<button class="rootsave" onclick="saveProjectsRoot()">Save</button>`;
    const inp=document.getElementById("rootIn"); inp.focus(); inp.select();
    inp.addEventListener("keydown",e=>{
      if(e.key==="Enter"){ e.preventDefault(); saveProjectsRoot(); }
      else if(e.key==="Escape"){ e.preventDefault(); renderAddRoot(); }
    });
    return;
  }
  custom.innerHTML="";
  saveProjectsRoot(v);                   // chosen folder (or "none") applies at once
}
async function saveProjectsRoot(val){
  const inp=document.getElementById("rootIn");
  let v=(typeof val==="string"?val:(inp?inp.value:"")).trim().replace(/\/+$/,"");
  if(v && !/^(\/|~)/.test(v)){
    const er=document.getElementById("rootErr");
    if(er) er.textContent="Use an absolute path (starts with / or ~).";
    return;
  }
  PROJECTS_ROOT=v;                       // optimistic; resync on next loadProjects
  await saveLayout({projects_root:v});
  renderAddRoot();
  // pre-fill the directory field if the user hasn't typed their own yet
  const dir=document.getElementById("addDir");
  if(dir && (!dir.value.trim() || /\/$/.test(dir.value.trim())))
    dir.value=v?v+"/":"";
}
async function createProject(create=false){
  const name=document.getElementById("addName").value.trim();
  const dir=document.getElementById("addDir").value.trim();
  const err=document.getElementById("addErr");
  if(!name||!dir){ err.textContent="Name and directory are both required."; return; }
  let r,j;
  try{
    r=await fetch("/api/project",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({name,dir,create})});
    j=await r.json();
  }catch(e){ err.textContent="Network error."; return; }
  if(!r.ok){
    if(j&&j.missing_dir){
      // Directory doesn't exist yet — offer to create it, then retry.
      err.innerHTML='Directory <code>'+esc(dir)+'</code> doesn’t exist. '+
        '<button type="button" class="mkdir" onclick="createProject(true)">Create it &amp; add project</button>';
      return;
    }
    err.textContent=(j&&j.error)||"Could not create tab."; return;
  }
  ADDING=false;
  await loadProjects();
  if(j.id) selectProject(j.id);
}

async function createTab(){
  const label=document.getElementById("tabLabel").value.trim();
  const file=document.getElementById("tabFile").value.trim();
  const err=document.getElementById("tabErr");
  if(!label||!file){ err.textContent="Label and file are both required."; return; }
  let r,j;

       body:JSON.stringify({project:CURRENT,label,file})}); j=await r.json(); }

  if(!r.ok){ err.textContent=(j&&j.error)||"Could not add tab."; return; }
  await loadProjects(); renderTabs();
  switchTab("doc:"+j.index);
}
async function removeTab(ev,i){
  ev.stopPropagation();
  const p=currentProject(), t=p&&p.tabs&&p.tabs[i];
  if(!confirm('Remove the "'+((t&&t.label)||"")+'" tab? (the file itself is not deleted)')) return;
  let r;
  try{ r=await fetch("/api/project/tabs/remove",{method:"POST",headers:{"Content-Type":"application/json"},
       body:JSON.stringify({project:CURRENT,index:i})}); }
  catch(e){ return; }
  if(!r.ok) return;
  await loadProjects(); renderTabs();
  switchTab("terminal");
}

async function renderMemory(){
  const p=PROJECTS.find(x=>x.id===CURRENT);
  const pane=document.getElementById("pane-memory");
  if(!p){pane.innerHTML='<div class="empty">No project.</div>';return;}
  const brief=p.memory||[], agent=p.agent_memory||[];
  let html='<div class="memlist">';
  // Group 1 — your brief: force-read into the agent on launch
  html+='<div class="globhd"><span>🧠 Your brief for <b>'+esc(p.name)+
        '</b> — force-read by <code>claude</code> on launch</span>'+
        '<button class="mini" onclick="addMemory()">+ Add memory</button></div>';
  if(!brief.length){
    html+='<div class="empty">No brief files yet. Click <b>+ Add memory</b> — it’s force-read by the agent.</div>';
  }else{
    for(const f of brief){
      html+='<div class="file" onclick="openMemory(\''+f+'\')"><b>'+esc(f)+'</b>'+
            '<span class="tabx" title="Unlink from memory" onclick="removeMemory(event,\''+f+'\')">×</span>'+
            '<div class="desc" id="desc-b-'+f.replace(/\W/g,'')+'">…</div></div>';
    }
  }
  // Group 2 — what the agent itself has remembered (claude writes + auto-recalls)
  html+='<div class="globhd" style="margin-top:20px"><span>🤖 What the agent remembers — written &amp; auto-recalled by <code>claude</code> itself</span></div>';
  if(!agent.length){
    html+='<div class="empty">The agent hasn’t saved any memories for this project yet.<br>Chat with it (type <code>claude</code> in the terminal) and watch this fill in.</div>';
  }else{
    for(const f of agent){
      html+='<div class="file" onclick="openMemory(\''+f+'\')"><b>'+esc(f)+'</b>'+
            '<div class="desc" id="desc-a-'+f.replace(/\W/g,'')+'">…</div></div>';
    }
  }
  pane.innerHTML=html+'</div>';
  // lazily fetch descriptions (group prefix avoids id collisions across groups)
  const fetchDesc=async(f,pre)=>{
    const r=await fetch("/api/memory?project="+encodeURIComponent(CURRENT)+"&file="+encodeURIComponent(f));
    if(r.ok){const t=(await r.json()).content; const m=t.match(/description:\s*(.*)/);
      const el=document.getElementById("desc-"+pre+"-"+f.replace(/\W/g,''));
      if(el) el.textContent=m?m[1].trim().replace(/^["']|["']$/g,""):"";}
  };
  for(const f of brief) fetchDesc(f,"b");
  for(const f of agent) fetchDesc(f,"a");
}

async function openMemory(f){
  const r=await fetch("/api/memory?project="+encodeURIComponent(CURRENT)+"&file="+encodeURIComponent(f));
  const pane=document.getElementById("pane-memory");
  if(!r.ok){pane.innerHTML='<div class="empty">Could not load '+esc(f)+'</div>';return;}
  const t=(await r.json()).content;
  // reuse the shared doc viewer so memory gets an Edit button; saving routes to
  // /api/memory/save via the "memory" scope (see docSave).
  showDoc("pane-memory",{file:f,content:t,kind:"markdown"},
          {scope:"memory",project:CURRENT,file:f},()=>renderMemory());
}

// Create a new force-read memory file (added to the project's memory[] -> the
// CLAUDE.md generator @-imports it), then drop straight into the editor.
async function addMemory(){
  const name=prompt("Name this memory file (e.g. preferences):");
  if(name===null||!name.trim()) return;
  let r,j;
  try{ r=await fetch("/api/memory/add",{method:"POST",headers:{"Content-Type":"application/json"},
       body:JSON.stringify({project:CURRENT,name:name})}); j=await r.json().catch(()=>({})); }
  catch(e){ alert("Network error."); return; }
  if(!r.ok){ alert((j&&j.error)||"Could not add memory."); return; }
  await loadProjects();
  if(j.file){ await openMemory(j.file); docEdit(); } else { renderMemory(); }
}
async function removeMemory(ev,f){
  ev.stopPropagation();
  if(!confirm('Unlink "'+f+'" from this project’s memory? (the file itself is not deleted)')) return;
  let r;
  try{ r=await fetch("/api/memory/remove",{method:"POST",headers:{"Content-Type":"application/json"},
       body:JSON.stringify({project:CURRENT,file:f})}); }
  catch(e){ return; }
  if(!r.ok) return;
  await loadProjects(); renderMemory();
}

// ⭐ Essentials + 🔐 Credentials — per-box reference tabs. The file list lives
// in the gitignored projects.json (top-level "essentials"/"credentials" arrays),
// so filenames are never committed. Populate each box via the file picker.
function renderGlobal(tab){
  const pane=document.getElementById("pane-"+tab);
  if(!pane) return;
  const items=GLOBALS[tab]||[];
  const title=tab==="essentials"?"⭐ Essentials":"🔐 Credentials";
  let h='<div class="memlist"><div class="globhd"><span>'+title+
        ' — files on this box</span><button class="mini" onclick="addGlobal(\''+tab+'\')">+ Add file</button></div>';
  if(!items.length){
    h+='<div class="empty">No files linked yet.<br>Click <b>+ Add file</b> to browse this box and link a .md / .txt file.</div>';
  }else{
    items.forEach((it,i)=>{
      h+='<div class="file" onclick="openGlobal(\''+tab+'\','+i+')"><b>'+esc(it.label)+'</b>'+
         '<span class="tabx" title="Remove from tab" onclick="removeGlobal(event,\''+tab+'\','+i+')">×</span>'+
         '<div class="desc">'+esc(it.file)+'</div></div>';
    });
  }
  pane.innerHTML=h+'</div>';
}
function renderEssentials(){ renderGlobal("essentials"); }
function renderCredentials(){ renderGlobal("credentials"); }

async function openGlobal(tab,i){
  const pane=document.getElementById("pane-"+tab);
  pane.innerHTML='<div class="empty">Loading…</div>';
  let r,d;
  try{ r=await fetch("/api/globaldoc?tab="+encodeURIComponent(tab)+"&i="+i); d=await r.json(); }
  catch(e){ pane.innerHTML='<div class="empty">Could not load.</div>'; return; }
  if(!r.ok){ pane.innerHTML='<div class="empty">'+esc((d&&d.error)||"Not found")+'</div>'; return; }
  showDoc("pane-"+tab, d, {scope:"global", tab:tab, index:i}, ()=>renderGlobal(tab));
}
async function removeGlobal(ev,tab,i){
  ev.stopPropagation();
  if(!confirm("Remove this file from the tab? (the file itself is not deleted)")) return;
  let r;
  try{ r=await fetch("/api/globals/remove",{method:"POST",headers:{"Content-Type":"application/json"},
       body:JSON.stringify({tab:tab,index:i})}); }
  catch(e){ return; }
  if(!r.ok) return;
  await loadProjects(); renderGlobal(tab);
}
function addGlobal(tab){
  openPicker(PICKER.dir, async function(path){
    let r,j;
    try{ r=await fetch("/api/globals/add",{method:"POST",headers:{"Content-Type":"application/json"},
         body:JSON.stringify({tab:tab,file:path})}); j=await r.json().catch(()=>({})); }
    catch(e){ alert("Network error."); return; }
    if(!r.ok){ alert((j&&j.error)||"Could not add file."); return; }
    await loadProjects(); renderGlobal(tab);
  });
}

// --- shared doc viewer with inline .md/.txt editing -----------------------
// save: {scope:"project",project,index} | {scope:"global",tab,index} | null (read-only)
let DOCCTX=null;
function showDoc(paneId,d,save,back){
  DOCCTX={paneId:paneId,d:d,save:save,back:back};
  const pane=document.getElementById(paneId);
  const missing=/^\(file not found/.test(d.content||"");
  const canEdit=!!save && !missing && /\.(md|markdown|txt)$/i.test(d.file||"");
  const body=d.kind==="markdown"?'<div class="md">'+mdToHtml(d.content)+'</div>'
                                :'<pre class="raw">'+esc(d.content)+'</pre>';
  let bar='<div class="docbar">';
  if(back) bar+='<span class="back" onclick="docBack()">← back</span>';
  bar+='<span class="docpath">'+esc(d.file)+'</span>';
  if(canEdit) bar+='<button class="mini" onclick="docEdit()">✎ Edit</button>';
  bar+='</div>';
  pane.innerHTML='<div class="docview">'+bar+body+'</div>';
}
function docBack(){ if(DOCCTX&&DOCCTX.back) DOCCTX.back(); }
function docEdit(){
  const d=DOCCTX.d, pane=document.getElementById(DOCCTX.paneId);
  pane.innerHTML='<div class="docview"><div class="docbar"><span class="docpath">'+esc(d.file)+
    '</span><button class="mini" onclick="docSave()">✔ Save</button>'+
    '<button class="mini ghost" onclick="docCancel()">Cancel</button></div>'+
    '<textarea id="docEditor" class="editor" spellcheck="false"></textarea>'+
    '<div class="adderr" id="docErr"></div></div>';
  const ed=document.getElementById("docEditor");
  ed.value=d.content; ed.focus();
}
function docCancel(){ showDoc(DOCCTX.paneId,DOCCTX.d,DOCCTX.save,DOCCTX.back); }
async function docSave(){
  const content=document.getElementById("docEditor").value;
  const err=document.getElementById("docErr");
  const sv=DOCCTX.save;
  const isMem=sv&&sv.scope==="memory";
  const url=isMem?"/api/memory/save":"/api/doc/save";
  const body=isMem?{project:sv.project,file:sv.file,content:content}
                  :Object.assign({content:content},sv);
  let r,j;
  try{ r=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},
       body:JSON.stringify(body)}); j=await r.json().catch(()=>({})); }
  catch(e){ err.textContent="Network error."; return; }
  if(!r.ok){ err.textContent=(j&&j.error)||"Could not save."; return; }
  DOCCTX.d.content=content;                       // reflect the save in the cached doc
  showDoc(DOCCTX.paneId,DOCCTX.d,DOCCTX.save,DOCCTX.back);
}

// --- file picker modal (browse this box to link a file) -------------------
let PICKER={cb:null,dir:"",parent:"",entries:[]};
function openPicker(startDir,cb){
  PICKER.cb=cb;
  let host=document.getElementById("pickerModal");
  if(!host){ host=document.createElement("div"); host.id="pickerModal"; host.className="modal"; document.body.appendChild(host); }
  host.style.display="flex";
  pickerLoad(startDir||"");
}
async function pickerLoad(dir){
  let r,d;
  try{ r=await fetch("/api/browse?dir="+encodeURIComponent(dir||"")); d=await r.json(); }
  catch(e){ return; }
  PICKER.dir=d.dir; PICKER.parent=d.parent; PICKER.entries=d.entries||[];
  let h='<div class="modalbox"><div class="modalhd"><b>Link a file</b>'+
        '<span class="x" onclick="closePicker()">×</span></div>'+
        '<div class="crumb">'+esc(d.dir)+'</div><div class="browse">'+
        '<div class="brow dir" onclick="pickerLoad(PICKER.parent)">📁 ..</div>';
  PICKER.entries.forEach((e,i)=>{
    h+= e.is_dir
      ? '<div class="brow dir" onclick="pickerInto('+i+')">📁 '+esc(e.name)+'</div>'
      : '<div class="brow file" onclick="pickerPick('+i+')">📄 '+esc(e.name)+'</div>';
  });
  h+='</div></div>';
  document.getElementById("pickerModal").innerHTML=h;
}
function pickerInto(i){ pickerLoad(PICKER.entries[i].path); }
function pickerPick(i){ const p=PICKER.entries[i].path, cb=PICKER.cb; closePicker(); if(cb) cb(p); }
function closePicker(){ const m=document.getElementById("pickerModal"); if(m) m.style.display="none"; }

// minimal, safe-ish markdown renderer (escapes HTML first)
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function mdToHtml(src){
  // strip YAML frontmatter into a small box
  let fm="";
  const fmm=src.match(/^---\n([\s\S]*?)\n---\n?/);
  if(fmm){fm='<pre style="font-size:12px;color:var(--muted)">'+esc(fmm[1])+'</pre>';src=src.slice(fmm[0].length);}
  let h=esc(src);
  h=h.replace(/```([\s\S]*?)```/g,(m,c)=>'<pre>'+c+'</pre>');
  h=h.replace(/^### (.*)$/gm,'<h3>$1</h3>')
     .replace(/^## (.*)$/gm,'<h2>$1</h2>')
     .replace(/^# (.*)$/gm,'<h1>$1</h1>');
  h=h.replace(/\[\[([^\]]+)\]\]/g,'<code>$1</code>');
  h=h.replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>');
  h=h.replace(/`([^`]+)`/g,'<code>$1</code>');
  h=h.replace(/^\s*-\s+(.*)$/gm,'<li>$1</li>');
  h=h.replace(/(<li>[\s\S]*?<\/li>)/g,'<ul>$1</ul>');
  h=h.replace(/\n{2,}/g,'</p><p>');
  return fm+'<p>'+h+'</p>';
}

loadProjects();
setInterval(loadProjects, 6000); // live status refresh (claude indicator, container state)
